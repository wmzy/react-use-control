name: CI

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version: [18, 19]
    name: React ${{ matrix.react-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - name: Install React ${{ matrix.react-version }}
        if: matrix.react-version != 18
        run: pnpm add -D react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }} @types/react@${{ matrix.react-version }}
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
